<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Proxuma Contentbibliotheek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');

  /* ============================================================
     Dxfferent Contentbibliotheek -- V2 Dark Theme
     Adapted from design CSS to target production class names.
     ============================================================ */

  :root {
    --font-display: "PP Monument Extended", "ppmonument", "Archivo Black",
                    "Inter Tight", "Helvetica Neue", system-ui, sans-serif;
    --font-body: "DM Sans", "dmsans", system-ui, -apple-system, sans-serif;

    /* Brand */
    --red:        #ED4C35;
    --orange:     #FF6927;
    --gradient:   linear-gradient(81deg, #ED4C35 0%, #FF6927 100%);
    --brown:      #522816;
    --orange-blk: #371D1A;

    /* Neutrals -- dark-first */
    --black-0:    #000000;
    --black-1:    #030303;
    --black-2:    #141414;
    --black-3:    #150101;
    --black-4:    #1F1F1F;
    --grey-1:     #303030;
    --grey-2:     #646464;
    --grey-3:     #AFAFAF;
    --white:      #FFFFFF;

    /* Surface tokens */
    --bg:         var(--black-1);
    --surface:    var(--black-4);
    --surface-2:  #2a2a2a;
    --surface-3:  var(--grey-1);
    --line:       #2c2c2c;
    --line-strong:#3a3a3a;
    --ink:        var(--white);
    --ink-2:      #e0e0e0;
    --ink-3:      var(--grey-3);
    --ink-4:      var(--grey-2);

    /* Category palette -- dark-mode jewel tones */
    --bewijs:    #5a8be8;  --bewijs-bg:#1a2540;  --bewijs-ink:#a3c0f0;
    --educatie:  #a888d8;  --educatie-bg:#2a2042; --educatie-ink:#cbb4ec;
    --markt:     #4fb37e;  --markt-bg:#16341f;   --markt-ink:#8fd6a8;
    --contrair:  #ff8c4a;  --contrair-bg:#3a2010; --contrair-ink:#ffb88a;
    --eigen:     #e878a3;  --eigen-bg:#3a1925;   --eigen-ink:#f0a5c4;
    --tools:     #d6b04a;  --tools-bg:#2f240a;   --tools-ink:#e8cc7a;

    /* Geometry -- sharp */
    --r-xs: 2px;
    --r-sm: 2px;
    --r-md: 4px;
    --r-lg: 4px;

    /* Motion */
    --t-quick: 0.15s ease-in-out;
    --t-base: 0.3s ease;
  }

  /* ---------- Base ---------- */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, h4, h5 {
    font-family: var(--font-display);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.005em;
    color: var(--white);
    margin: 0;
    line-height: 1.05;
  }

  ::selection { background: var(--orange); color: var(--white); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--black-1); }
  ::-webkit-scrollbar-thumb { background: var(--grey-1); border-radius: 0; }
  ::-webkit-scrollbar-thumb:hover { background: var(--grey-2); }

  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  /* ---------- Tab navigation ---------- */
  .tab-nav {
    display: inline-flex;
    gap: 0;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--line);
    background: transparent;
  }
  .tab-btn {
    appearance: none;
    border: 0;
    background: transparent;
    padding: 14px 22px;
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 12px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-3);
    border-bottom: 2px solid transparent;
    transition: color var(--t-quick), border-color var(--t-quick);
    margin-bottom: -1px;
    cursor: pointer;
  }
  .tab-btn:hover { color: var(--white); }
  .tab-btn.active {
    color: var(--white);
    border-bottom-color: var(--orange);
  }

  /* ---------- Header ---------- */
  .header {
    margin-bottom: 8px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }
  .header h1 {
    font-family: var(--font-display);
    font-size: clamp(28px, 3.6vw, 44px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.005em;
  }
  .header-sub {
    color: var(--ink-3);
    font-size: 15px;
    margin-top: 10px;
    max-width: 60ch;
  }

  /* ---------- Stats bar ---------- */
  .stats {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: var(--ink-4);
    margin: 12px 0 20px;
  }
  .stats .stat-num {
    font-weight: 700;
    color: var(--white);
  }

  /* ---------- Filter rows ---------- */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .filter-row-label {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-4);
    margin-bottom: 4px;
  }
  .pill {
    padding: 7px 14px;
    border-radius: var(--r-sm);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .04em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--grey-1);
    color: var(--ink-3);
    background: transparent;
    transition: all var(--t-quick);
    user-select: none;
    font-family: var(--font-body);
  }
  .pill:hover { border-color: var(--grey-2); color: var(--white); }
  .pill.active {
    background: var(--gradient);
    color: var(--white);
    border-color: transparent;
  }
  /* Category pills -- dark jewel tones */
  .pill-bewijs.active { background: var(--bewijs-bg); color: var(--bewijs-ink); border-color: var(--bewijs); }
  .pill-educatie.active { background: var(--educatie-bg); color: var(--educatie-ink); border-color: var(--educatie); }
  .pill-markt.active { background: var(--markt-bg); color: var(--markt-ink); border-color: var(--markt); }
  .pill-contrair.active { background: var(--contrair-bg); color: var(--contrair-ink); border-color: var(--contrair); }
  .pill-eigen.active { background: var(--eigen-bg); color: var(--eigen-ink); border-color: var(--eigen); }
  .pill-tools.active { background: var(--tools-bg); color: var(--tools-ink); border-color: var(--tools); }
  .filter-sep { height: 1px; background: var(--line); margin: 12px 0 16px; }

  .free-form-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 11px 24px;
    background: var(--gradient);
    color: var(--white);
    border: none;
    border-radius: var(--r-xs);
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: .14em;
    text-transform: uppercase;
    cursor: pointer;
    margin-bottom: 16px;
    transition: opacity var(--t-quick);
  }
  .free-form-btn:hover { opacity: 0.85; }

  /* ---------- Cards ---------- */
  .card-count { font-size: 12px; color: var(--ink-4); margin-bottom: 10px; }
  .card {
    position: relative;
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 18px 18px 16px;
    margin-bottom: 8px;
    background: var(--surface);
    cursor: pointer;
    transition: border-color var(--t-base), background var(--t-base), transform var(--t-quick);
    overflow: hidden;
  }
  .card:hover {
    border-color: var(--orange);
    background: #232323;
    transform: translateY(-1px);
  }
  /* Top accent bar that swipes in on hover */
  .card::after {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--gradient);
    transform: scaleX(0);
    transform-origin: left center;
    transition: transform var(--t-base);
  }
  .card:hover::after { transform: scaleX(1); }
  /* Left spine accent */
  .card::before {
    content: "";
    position: absolute;
    inset: 0 auto 0 0;
    width: 3px;
    background: var(--grey-2);
  }
  .card-written {
    background: var(--markt-bg);
    border-color: var(--markt);
  }
  .card-written::before { background: var(--markt); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
  .card-title {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--white);
    line-height: 1.45;
    flex: 1;
  }
  .cat-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: var(--r-xs);
    white-space: nowrap;
    flex-shrink: 0;
    background: var(--surface-3);
    color: var(--ink-3);
    border: 0;
  }
  .cat-badge::before {
    content: "";
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
  }
  .cat-bewijs { background: var(--bewijs-bg); color: var(--bewijs-ink); }
  .cat-educatie { background: var(--educatie-bg); color: var(--educatie-ink); }
  .cat-markt { background: var(--markt-bg); color: var(--markt-ink); }
  .cat-contrair { background: var(--contrair-bg); color: var(--contrair-ink); }
  .cat-eigen { background: var(--eigen-bg); color: var(--eigen-ink); }
  .cat-tools { background: var(--tools-bg); color: var(--tools-ink); }
  .card-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .hook-tag { font-size: 11px; color: var(--ink-3); font-style: italic; }
  .source-tag { font-size: 11px; color: var(--ink-4); }
  .sep { font-size: 11px; color: var(--grey-1); }
  .status-tag { font-size: 10px; font-weight: 600; color: var(--markt-ink); }

  /* ---------- Views ---------- */
  .view { display: none; }
  .view.active { display: block; }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 2px solid var(--orange);
    border-radius: var(--r-xs);
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--white);
    cursor: pointer;
    padding: 11px 24px;
    margin-bottom: 16px;
    transition: all var(--t-quick);
  }
  .back-btn:hover {
    background: var(--gradient);
    border-color: transparent;
  }

  /* ---------- Editor ---------- */
  .editor-layout { display: grid; grid-template-columns: 1fr 320px; gap: 24px; }
  @media (max-width: 768px) { .editor-layout { grid-template-columns: 1fr; } }
  .field-label {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 7px;
  }
  .author-input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--grey-1);
    border-radius: var(--r-xs);
    font-size: 14px;
    font-family: var(--font-body);
    margin-bottom: 16px;
    background: var(--black-2);
    color: var(--white);
    transition: border-color var(--t-quick);
  }
  .author-input:focus { outline: none; border-color: var(--orange); }
  .author-input::placeholder { color: var(--ink-4); }
  .content-area {
    width: 100%;
    min-height: 400px;
    padding: 14px 16px;
    border: 1px solid var(--grey-1);
    border-radius: var(--r-md);
    font-size: 14px;
    font-family: var(--font-body);
    line-height: 1.6;
    resize: vertical;
    margin-bottom: 12px;
    background: var(--black-2);
    color: var(--white);
    transition: border-color var(--t-quick);
  }
  .content-area:focus { outline: none; border-color: var(--orange); }
  .content-area::placeholder { color: var(--ink-4); }
  .editor-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-save {
    padding: 11px 24px;
    background: var(--gradient);
    color: var(--white);
    border: none;
    border-radius: var(--r-xs);
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: .14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity var(--t-quick);
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-done {
    padding: 11px 24px;
    background: transparent;
    color: var(--markt-ink);
    border: 2px solid var(--markt);
    border-radius: var(--r-xs);
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: .14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all var(--t-quick);
  }
  .btn-done:hover { background: var(--markt-bg); }
  .btn-done.is-done {
    background: var(--markt);
    color: var(--white);
    border-color: var(--markt);
  }
  .save-status { font-size: 12px; color: var(--ink-4); margin-top: 8px; }

  /* ---------- Sidebar ---------- */
  .sidebar-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 16px;
    margin-bottom: 12px;
  }
  .sidebar-card h3 {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-4);
    font-weight: 900;
    margin-bottom: 10px;
  }
  .sidebar-hook { font-size: 13px; font-style: italic; color: var(--ink-2); line-height: 1.5; }
  .sidebar-domain { font-size: 12px; color: var(--ink-4); margin-top: 8px; }
  .context-section { margin-top: 12px; }
  .context-section h4 {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-4);
    margin-bottom: 6px;
  }
  .context-list { list-style: none; padding: 0; }
  .context-list li {
    font-size: 12px;
    color: var(--ink-2);
    line-height: 1.5;
    padding: 3px 0;
    padding-left: 12px;
    position: relative;
  }
  .context-list li::before { content: "\2022"; position: absolute; left: 0; color: var(--ink-4); }
  .free-form-notice { font-size: 13px; color: var(--ink-4); font-style: italic; }

  /* ---------- Dashboard ---------- */
  .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
  @media (max-width: 768px) { .dash-grid { grid-template-columns: 1fr; } }
  .dash-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 22px 22px 20px;
    position: relative;
    overflow: hidden;
  }
  /* Trapezoid accent at top-right of dashboard cards */
  .dash-card::before {
    content: "";
    position: absolute;
    top: 0; right: 0;
    width: 60px; height: 4px;
    background: var(--gradient);
    clip-path: polygon(25% 0%, 100% 0%, 100% 100%, 0% 100%);
  }
  .dash-card h3 {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-4);
    font-weight: 900;
    margin-bottom: 12px;
  }

  /* Progress rows */
  .progress-row {
    display: grid;
    grid-template-columns: 110px 1fr 60px;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    font-size: 13px;
  }
  .progress-label {
    color: var(--ink-2);
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: .12em;
    text-transform: uppercase;
    width: auto;
    flex-shrink: 0;
  }
  .progress-bar {
    height: 6px;
    background: var(--black-2);
    border-radius: 0;
    overflow: hidden;
    border: 0;
    flex: 1;
  }
  .progress-fill {
    height: 100%;
    border-radius: 0;
    transition: width var(--t-base);
    background: var(--gradient);
    position: relative;
  }
  .progress-num {
    text-align: right;
    font-family: var(--font-display);
    color: var(--white);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    letter-spacing: .04em;
    width: auto;
    flex-shrink: 0;
  }

  /* Leaderboard */
  .leader-row {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: var(--r-md);
    background: var(--black-2);
    border: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    margin-bottom: 6px;
    transition: border-color var(--t-quick), background var(--t-quick);
  }
  .leader-row:last-child { border-bottom: 1px solid var(--line); margin-bottom: 0; }
  .leader-row:hover { border-color: var(--orange); background: #1a1a1a; }
  .leader-rank {
    width: 32px;
    height: 32px;
    border-radius: 0;
    background: var(--surface-3);
    display: inline-grid;
    place-items: center;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 900;
    color: var(--ink-3);
    flex-shrink: 0;
    /* Trapezoid brand signature shape */
    clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
  }
  .leader-rank.top {
    background: var(--gradient);
    color: var(--white);
  }
  .leader-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    flex: 1;
  }
  .leader-count {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 900;
    color: var(--white);
    font-variant-numeric: tabular-nums;
  }

  /* Activity feed */
  .activity-item {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
    color: var(--ink-2);
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-author { font-size: 12px; font-weight: 600; color: var(--white); }
  .activity-topic { font-size: 12px; color: var(--ink-2); }
  .activity-time {
    font-size: 11px;
    color: var(--ink-4);
    font-family: var(--font-display);
    text-transform: uppercase;
    letter-spacing: .1em;
    width: 100%;
  }

  /* Dashboard stats row */
  .dash-stat-row { display: flex; gap: 14px; margin-bottom: 24px; }
  .dash-stat {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 22px 20px;
    flex: 1;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  /* Trapezoid accent on stat cards */
  .dash-stat::before {
    content: "";
    position: absolute;
    top: 0; right: 0;
    width: 60px; height: 4px;
    background: var(--gradient);
    clip-path: polygon(25% 0%, 100% 0%, 100% 100%, 0% 100%);
  }
  .dash-stat-num {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 48px;
    line-height: 1;
    text-transform: uppercase;
    color: var(--white);
    font-variant-numeric: tabular-nums;
    letter-spacing: -.01em;
  }
  .dash-stat-label {
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-4);
    font-weight: 900;
    margin-top: 8px;
  }

  /* ---------- Calendar ---------- */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
  .cal-nav { display: flex; align-items: center; gap: 12px; }
  .cal-nav-btn {
    background: transparent;
    border: 2px solid var(--orange);
    border-radius: var(--r-xs);
    padding: 11px 20px;
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: .14em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--white);
    transition: all var(--t-quick);
  }
  .cal-nav-btn:hover {
    background: var(--gradient);
    border-color: transparent;
  }
  .cal-week-label {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 900;
    letter-spacing: .02em;
    color: var(--white);
    min-width: 180px;
    text-align: center;
    text-transform: uppercase;
  }
  .cal-actions { display: flex; gap: 8px; }
  .cal-auto-btn {
    padding: 11px 24px;
    background: var(--gradient);
    color: var(--white);
    border: none;
    border-radius: var(--r-xs);
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: .14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity var(--t-quick);
  }
  .cal-auto-btn:hover { opacity: 0.85; }
  /* 5-column calendar grid */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    overflow: hidden;
  }
  .cal-day {

<body>

<div class="container">

<div class="toast" id="toast"></div>

<script>
const API = '/api';
const CAT_LABELS = {
  bewijs: 'Bewijs & resultaat', educatie: 'Educatie & uitleg', markt: 'Markt & visie',
  contrair: 'Contrair & polariserend', eigen: 'Eigen verhaal', tools: 'Tools & resources'
};
const CAT_COLORS = {
  bewijs: '#0C447C', educatie: '#3C3489', markt: '#085041',
  contrair: '#712B13', eigen: '#72243E', tools: '#633806'
};
const DAY_NAMES = ['', 'ma', 'di', 'wo', 'do', 'vr', 'za', 'zo'];

let topics = [];
let activeDomain = 'all';
let activeCat = 'all';
let currentTopic = null;
let currentSubmission = null;
let autoSaveTimer = null;
let isDirty = false;
let currentTab = 'board';
let calWeekStart = getMonday(new Date());
let calEntries = [];
let editingCalId = null;
let topicsLoadedAt = 0;
let isSaving = false;
let autoSaveInputHandler = null;

async function apiCall(path, opts = {}) {
  let res;
  try {
    res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json' },
      ...opts,
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
  } catch (e) {
    toast('Netwerkfout — probeer opnieuw');
    throw e;
  }
  const data = await res.json();
  if (!res.ok) {
    toast(data.error || 'Er ging iets mis');
    throw new Error(data.error || res.statusText);
  }
  return data;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
  dt.setDate(diff);
  dt.setHours(0, 0, 0, 0);
  return dt;
}

function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function fmtDateNL(d) {
  return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
}

// ============ TAB SWITCHING ============

function switchTab(tab) {
  stopAutoSave();
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['board', 'dashboard', 'calendar'][i] === tab);
  });
  ['boardView', 'editorView', 'dashboardView', 'calendarView'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  if (tab === 'board') {
    document.getElementById('boardView').classList.add('active');
    loadTopics();
  } else if (tab === 'dashboard') {
    document.getElementById('dashboardView').classList.add('active');
    loadDashboard();
  } else if (tab === 'calendar') {
    document.getElementById('calendarView').classList.add('active');
    loadCalendar();
  }
  window.scrollTo(0, 0);
}

// ============ BOARD ============

async function loadTopics(force = false) {
  if (!force && topics.length && Date.now() - topicsLoadedAt < 10000) {
    renderCards(); renderStats(); renderFilters(); return;
  }
  topics = await apiCall('/topics');
  topicsLoadedAt = Date.now();
  renderFilters();
  renderCards();
  renderStats();
}

function renderStats() {
  const total = topics.length;
  const written = topics.filter(t => t.status === 'written').length;
  const open = topics.filter(t => t.status === 'open').length;
  const claimed = topics.filter(t => t.status === 'claimed').length;
  document.getElementById('stats').innerHTML =
    `<span><span class="stat-num">${total}</span> topics</span>` +
    `<span><span class="stat-num">${written}</span> geschreven</span>` +
    `<span><span class="stat-num">${open}</span> open</span>` +
    (claimed ? `<span><span class="stat-num">${claimed}</span> geclaimd</span>` : '');
}

function renderFilters() {
  const domains = [...new Set(topics.map(t => t.domain))].sort();
  let domainHtml = `<span class="pill ${activeDomain === 'all' ? 'active' : ''}" onclick="setDomain('all')">Alles</span>`;
  domains.forEach(d => {
    const count = topics.filter(t => t.domain === d).length;
    domainHtml += `<span class="pill ${activeDomain === d ? 'active' : ''}" data-val="${esc(d)}" onclick="setDomain(this.dataset.val)">${esc(d)} (${count})</span>`;
  });
  document.getElementById('domainFilters').innerHTML = domainHtml;
  let catHtml = `<span class="pill ${activeCat === 'all' ? 'active' : ''}" onclick="setCat('all')">Alles</span>`;
  Object.entries(CAT_LABELS).forEach(([key, label]) => {
    const count = topics.filter(t => t.category === key).length;
    catHtml += `<span class="pill pill-${key} ${activeCat === key ? 'active' : ''}" data-val="${esc(key)}" onclick="setCat(this.dataset.val)">${label} (${count})</span>`;
  });
  document.getElementById('catFilters').innerHTML = catHtml;
}

function setDomain(d) { activeDomain = d; renderFilters(); renderCards(); }
function setCat(c) { activeCat = c; renderFilters(); renderCards(); }

function renderCards() {
  let filtered = topics;
  if (activeDomain !== 'all') filtered = filtered.filter(t => t.domain === activeDomain);
  if (activeCat !== 'all') filtered = filtered.filter(t => t.category === activeCat);
  document.getElementById('cardCount').textContent = filtered.length + ' content-ideeën';
  document.getElementById('cards').innerHTML = filtered.map(t => `
    <div class="card ${t.status === 'written' ? 'card-written' : ''}" onclick="openEditor(${t.id})">
      <div class="card-top">
        <div class="card-title">${esc(t.title)}</div>
        <span class="cat-badge cat-${t.category}">${CAT_LABELS[t.category]}</span>
      </div>
      <div class="card-meta">
        <span class="hook-tag">${esc(t.hook)}</span>
        <span class="sep">&middot;</span>
        <span class="source-tag">${esc(t.domain)}${t.subdomain ? ' / ' + esc(t.subdomain) : ''}</span>
        ${t.status === 'written' ? '<span class="sep">&middot;</span><span class="status-tag">&#10003; geschreven' + (t.claimed_by ? ' door ' + esc(t.claimed_by) : '') + '</span>' : ''}
        ${t.status === 'claimed' && t.claimed_by ? '<span class="sep">&middot;</span><span style="font-size:10px;color:#c27803">geclaimd door ' + esc(t.claimed_by) + '</span>' : ''}
      </div>
    </div>
  `).join('');
}

// ============ EDITOR ============

async function openEditor(topicId) {
  currentTopic = await apiCall('/topics/' + topicId);
  currentSubmission = null;
  const author = localStorage.getItem('author') || '';
  document.getElementById('authorInput').value = author;
  if (currentTopic.submissions && currentTopic.submissions.length > 0) {
    const mine = author ? currentTopic.submissions.find(s => s.author === author) : null;
    currentSubmission = mine || currentTopic.submissions[0];
    document.getElementById('contentArea').value = currentSubmission.raw_content;
    if (!author && currentSubmission.author) document.getElementById('authorInput').value = currentSubmission.author;
  } else {
    document.getElementById('contentArea').value = '';
  }
  renderSidebar();
  updateDoneBtn();
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('editorView').classList.add('active');
  startAutoSave();
}

function openFreeForm() {
  currentTopic = null;
  currentSubmission = null;
  const author = localStorage.getItem('author') || '';
  document.getElementById('authorInput').value = author;
  document.getElementById('contentArea').value = '';
  renderSidebar();
  updateDoneBtn();
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('editorView').classList.add('active');
  startAutoSave();
}

function renderSidebar() {
  const sidebar = document.getElementById('editorSidebar');
  if (!currentTopic) {
    sidebar.innerHTML = `<div class="sidebar-card"><h3>Vrije tekst</h3><p class="free-form-notice">Schrijf wat je wilt. Claude categoriseert dit later automatisch op basis van de inhoud.</p></div>`;
    return;
  }
  const t = currentTopic;
  let contextHtml = '';
  if (t.context) {
    [{ key: 'problemen', label: 'Problemen' }, { key: 'frustraties', label: 'Frustraties' }, { key: 'vragen', label: 'Vragen' }].forEach(s => {
      if (t.context[s.key] && t.context[s.key].length) {
        contextHtml += `<div class="context-section"><h4>${s.label}</h4><ul class="context-list">${t.context[s.key].map(item => `<li>${esc(item)}</li>`).join('')}</ul></div>`;
      }
    });
  }
  sidebar.innerHTML = `
    <div class="sidebar-card"><h3>Hook template</h3><div class="sidebar-hook">${esc(t.hook)}</div>
      <div class="sidebar-domain"><span class="cat-badge cat-${t.category}">${CAT_LABELS[t.category]}</span>
      <span style="margin-left:8px;font-size:12px;color:#888;">${esc(t.domain)}${t.subdomain ? ' / ' + esc(t.subdomain) : ''}</span></div></div>
    ${contextHtml ? `<div class="sidebar-card"><h3>MSP Journey context</h3>${contextHtml}</div>` : ''}`;
}

function updateDoneBtn() {
  const btn = document.getElementById('doneBtn');
  if (!currentTopic) { btn.style.display = 'none'; return; }
  btn.style.display = '';
  if (currentTopic.status === 'written') { btn.classList.add('is-done'); btn.textContent = 'Geschreven'; }
  else { btn.classList.remove('is-done'); btn.textContent = 'Markeer als geschreven'; }
}

async function saveSubmission() {
  if (isSaving) return;
  const author = document.getElementById('authorInput').value.trim();
  const content = document.getElementById('contentArea').value.trim();
  if (!author) { toast('Vul je naam in'); return; }
  if (!content) { toast('Schrijf eerst iets'); return; }
  localStorage.setItem('author', author);
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Opslaan...';
  isSaving = true;
  try {
    if (currentSubmission) {
      await apiCall('/submissions/' + currentSubmission.id, { method: 'PATCH', body: { raw_content: content } });
    } else {
      const res = await apiCall('/submissions', { method: 'POST', body: { topic_id: currentTopic ? currentTopic.id : null, author, raw_content: content } });
      currentSubmission = res;
    }
    if (currentTopic && currentTopic.status === 'open') {
      await apiCall('/topics/' + currentTopic.id, { method: 'PATCH', body: { status: 'claimed', claimed_by: author } });
      currentTopic.status = 'claimed'; currentTopic.claimed_by = author;
    }
    isDirty = false;
    document.getElementById('saveStatus').textContent = 'Opgeslagen om ' + new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
    toast('Opgeslagen');
  } catch (e) {
    document.getElementById('saveStatus').textContent = 'Opslaan mislukt';
  } finally {
    isSaving = false;
    btn.disabled = false; btn.textContent = 'Opslaan';
  }
}

async function toggleDone() {
  if (!currentTopic) return;
  const author = document.getElementById('authorInput').value.trim();
  if (!author) { toast('Vul je naam in'); return; }
  const content = document.getElementById('contentArea').value.trim();
  if (!content && currentTopic.status !== 'written') { toast('Schrijf eerst iets voordat je markeert als geschreven'); return; }
  if (content && isDirty) await saveSubmission();
  const newStatus = currentTopic.status === 'written' ? 'open' : 'written';
  try {
    await apiCall('/topics/' + currentTopic.id, { method: 'PATCH', body: { status: newStatus, claimed_by: newStatus === 'written' ? author : null } });
    currentTopic.status = newStatus; currentTopic.claimed_by = newStatus === 'written' ? author : null;
    updateDoneBtn();
    toast(newStatus === 'written' ? 'Gemarkeerd als geschreven' : 'Status teruggezet naar open');
  } catch (e) {}
}

async function closeEditor() {
  stopAutoSave();
  if (isDirty) {
    const author = document.getElementById('authorInput').value.trim();
    const content = document.getElementById('contentArea').value.trim();
    if (author && content) await saveSubmission();
  }
  switchTab('board');
}

function startAutoSave() {
  const area = document.getElementById('contentArea');
  if (autoSaveInputHandler) area.removeEventListener('input', autoSaveInputHandler);
  autoSaveInputHandler = () => { isDirty = true; };
  area.addEventListener('input', autoSaveInputHandler);
  stopAutoSave();
  autoSaveTimer = setInterval(() => {
    if (isDirty && !isSaving) {
      const author = document.getElementById('authorInput').value.trim();
      const content = document.getElementById('contentArea').value.trim();
      if (author && content) saveSubmission();
    }
  }, 30000);
}

function stopAutoSave() { if (autoSaveTimer) { clearInterval(autoSaveTimer); autoSaveTimer = null; } }

document.getElementById('contentArea').addEventListener('blur', () => {
  if (isDirty) {
    const author = document.getElementById('authorInput').value.trim();
    const content = document.getElementById('contentArea').value.trim();
    if (author && content) saveSubmission();
  }
});

// ============ DASHBOARD ============

async function loadDashboard() {
  const d = await apiCall('/dashboard');
  const totalTopics = d.by_domain.reduce((s, r) => s + r.total, 0);
  const totalWritten = d.by_domain.reduce((s, r) => s + r.written, 0);
  const totalSubs = d.leaderboard.reduce((s, r) => s + r.submissions, 0);

  document.getElementById('dashStats').innerHTML = `
    <div class="dash-stat"><div class="dash-stat-num">${totalTopics}</div><div class="dash-stat-label">Topics</div></div>
    <div class="dash-stat"><div class="dash-stat-num">${totalWritten}</div><div class="dash-stat-label">Geschreven</div></div>
    <div class="dash-stat"><div class="dash-stat-num">${totalSubs}</div><div class="dash-stat-label">Submissions</div></div>
    <div class="dash-stat"><div class="dash-stat-num">${d.calendar_stats.upcoming || 0}</div><div class="dash-stat-label">Gepland</div></div>
  `;

  document.getElementById('dashDomain').innerHTML = d.by_domain.map(r => {
    const pct = r.total ? Math.round(r.written / r.total * 100) : 0;
    return `<div class="progress-row">
      <div class="progress-label">${esc(r.domain)}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:#2b8a3e"></div></div>
      <div class="progress-num">${r.written}/${r.total}</div>
    </div>`;
  }).join('');

  document.getElementById('dashCategory').innerHTML = d.by_category.map(r => {
    const pct = r.total ? Math.round(r.written / r.total * 100) : 0;
    const color = CAT_COLORS[r.category] || '#888';
    return `<div class="progress-row">
      <div class="progress-label">${CAT_LABELS[r.category] || r.category}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="progress-num">${r.written}/${r.total}</div>
    </div>`;
  }).join('');

  document.getElementById('dashLeaderboard').innerHTML = d.leaderboard.length
    ? d.leaderboard.map((r, i) => `
      <div class="leader-row">
        <div class="leader-rank ${i === 0 ? 'top' : ''}">${i + 1}</div>
        <div class="leader-name">${esc(r.author)}</div>
        <div class="leader-count">${r.submissions} bijdrage${r.submissions !== 1 ? 'n' : ''}</div>
      </div>`).join('')
    : '<div style="font-size:13px;color:#888;padding:8px 0">Nog geen bijdragen</div>';

  document.getElementById('dashActivity').innerHTML = d.recent_activity.length
    ? d.recent_activity.map(a => `
      <div class="activity-item">
        <span class="activity-author">${esc(a.author)}</span>
        <span class="activity-topic"> ${a.topic_title ? 'schreef aan: ' + esc(a.topic_title).slice(0, 60) : 'vrije tekst'}</span>
        <div class="activity-time">${new Date(a.created_at + 'Z').toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}</div>
      </div>`).join('')
    : '<div style="font-size:13px;color:#888;padding:8px 0">Nog geen activiteit</div>';
}

// ============ CALENDAR ============

async function loadCalendar() {
  const from = fmtDate(calWeekStart);
  const endDate = new Date(calWeekStart);
  endDate.setDate(endDate.getDate() + 27);
  const to = fmtDate(endDate);

  calEntries = await apiCall(`/calendar?from=${from}&to=${to}`);
  if (!topics.length) topics = await apiCall('/topics');
  renderCalendar();
}

function calNavWeek(dir) {
  calWeekStart.setDate(calWeekStart.getDate() + dir * 7);
  loadCalendar();
}

function renderCalendar() {
  const today = fmtDate(new Date());
  const weekEnd = new Date(calWeekStart);
  weekEnd.setDate(weekEnd.getDate() + 4);

  const monthNames = ['jan', 'feb', 'mrt', 'apr', 'mei', 'jun', 'jul', 'aug', 'sep', 'okt', 'nov', 'dec'];
  const startMonth = monthNames[calWeekStart.getMonth()];
  const endMonth = monthNames[weekEnd.getMonth()];
  const label = calWeekStart.getDate() + (startMonth !== endMonth ? ' ' + startMonth : '') + ' - ' + weekEnd.getDate() + ' ' + endMonth + ' ' + weekEnd.getFullYear();
  document.getElementById('calWeekLabel').textContent = label;

  let html = '';
  for (let i = 0; i < 5; i++) {
    const d = new Date(calWeekStart);
    d.setDate(d.getDate() + i);
    const dateStr = fmtDate(d);
    const isToday = dateStr === today;
    const isPast = dateStr < today;
    const dayEntries = calEntries.filter(e => e.scheduled_date === dateStr);

    html += `<div class="cal-day ${isToday ? 'today' : ''} ${isPast ? 'past' : ''}">
      <div class="cal-day-header">
        <div><span class="cal-day-name">${DAY_NAMES[(d.getDay() || 7)]}</span> <span class="cal-day-date">${d.getDate()} ${monthNames[d.getMonth()]}</span></div>
        <button class="cal-add-btn" onclick="openCalModal('${dateStr}')">+</button>
      </div>`;

    dayEntries.forEach(e => {
      html += `<div class="cal-entry ${e.status === 'posted' ? 'cal-status-posted' : ''}" onclick="openCalModal(null, ${e.id})">
        <div class="cal-entry-title">${esc(e.title)}</div>
        <div class="cal-entry-meta">
          <span class="cal-platform ${e.platform}">${e.platform === 'linkedin' ? 'LI' : 'DXF'}</span>
          <span class="cal-account">${esc(e.account)}</span>
          <span class="cal-type">${esc(e.content_type)}</span>
        </div>
      </div>`;
    });

    html += `</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
}

function openCalModal(date, entryId) {
  editingCalId = entryId || null;
  const modal = document.getElementById('calModal');

  if (entryId) {
    const entry = calEntries.find(e => e.id == entryId);
    if (!entry) return;
    document.getElementById('calModalTitle').textContent = 'Post bewerken';
    document.getElementById('calDate').value = entry.scheduled_date;
    document.getElementById('calTitle').value = entry.title;
    document.getElementById('calPlatform').value = entry.platform;
    document.getElementById('calAccount').value = entry.account;
    document.getElementById('calContentType').value = entry.content_type;
    document.getElementById('calStatus').value = entry.status;
    document.getElementById('calDeleteBtn').style.display = '';
  } else {
    document.getElementById('calModalTitle').textContent = 'Nieuwe post plannen';
    document.getElementById('calDate').value = date;
    document.getElementById('calTitle').value = '';
    document.getElementById('calTitle').dataset.topicId = '';
    document.getElementById('topicSearch').value = '';
    document.getElementById('calPlatform').value = 'linkedin';
    document.getElementById('calAccount').value = localStorage.getItem('author') || '';
    document.getElementById('calContentType').value = 'post';
    document.getElementById('calStatus').value = 'planned';
    document.getElementById('calDeleteBtn').style.display = 'none';
  }

  renderTopicPicker();
  modal.classList.add('open');
}

function closeCalModal() {
  document.getElementById('calModal').classList.remove('open');
  editingCalId = null;
}

function renderTopicPicker() {
  const search = (document.getElementById('topicSearch').value || '').toLowerCase();
  const picker = document.getElementById('topicPicker');
  const filtered = topics.filter(t => !search || t.title.toLowerCase().includes(search)).slice(0, 15);
  picker.innerHTML = filtered.map(t =>
    `<div class="topic-pick-item" onclick="pickTopic(${t.id})">${esc(t.title)}</div>`
  ).join('');
}

function filterTopicPicker() { renderTopicPicker(); }

function pickTopic(id) {
  const t = topics.find(x => x.id === id);
  if (t) {
    document.getElementById('calTitle').value = t.title;
    document.getElementById('topicSearch').value = '';
    document.getElementById('topicPicker').innerHTML = '';
    document.getElementById('calTitle').dataset.topicId = id;
  }
}

async function saveCalEntry() {
  const data = {
    scheduled_date: document.getElementById('calDate').value,
    title: document.getElementById('calTitle').value.trim(),
    platform: document.getElementById('calPlatform').value,
    account: document.getElementById('calAccount').value.trim(),
    content_type: document.getElementById('calContentType').value,
    status: document.getElementById('calStatus').value,
  };
  const topicId = document.getElementById('calTitle').dataset.topicId;
  if (topicId) data.topic_id = parseInt(topicId);

  if (!data.title || !data.account || !data.scheduled_date) {
    toast('Vul titel, account en datum in');
    return;
  }

  try {
    if (editingCalId) {
      await apiCall('/calendar/' + editingCalId, { method: 'PATCH', body: data });
      toast('Bijgewerkt');
    } else {
      await apiCall('/calendar', { method: 'POST', body: data });
      toast('Gepland');
    }
    document.getElementById('calTitle').dataset.topicId = '';
    closeCalModal();
    loadCalendar();
  } catch (e) {}
}

async function deleteCalEntry() {
  if (!editingCalId) return;
  try {
    await apiCall('/calendar/' + editingCalId, { method: 'DELETE' });
    toast('Verwijderd');
    closeCalModal();
    loadCalendar();
  } catch (e) {}
}

async function autoPlan() {
  try {
    const res = await apiCall('/calendar/auto-plan?weeks=2', { method: 'POST' });
    toast(`${res.created} posts gepland`);
    loadCalendar();
  } catch (e) {}
}

document.getElementById('calModal').addEventListener('click', (e) => {
  if (e.target.id === 'calModal') closeCalModal();
});

// ============ INIT ============
loadTopics();
</script>
